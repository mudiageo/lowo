<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAFAFA" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0A0F" />
    <meta name="description" content="Lowo — Premium Nigerian-context personal budget planner. Offline capable. Track expenses, set savings goals and get AI insights." />
    <!-- PWA / App Shell -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lowo" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
    <!-- Favicon -->
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
